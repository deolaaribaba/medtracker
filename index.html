<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Medtracker</title>
<style>
 body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #7a1f5c; margin:0; padding:20px; min-height:100vh; }
 .container { max-width:500px; margin:0 auto; background:#f5f3f4; border-radius:20px; padding:25px; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
 h1 { color:#7a1f5c; text-align:center; margin-top:0; }
 label { display:block; margin-top:15px; font-weight:600; color:#333; }
 input { width:100%; padding:12px; margin-top:5px; border:2px solid #e0d6dd; border-radius:10px; font-size:16px; box-sizing:border-box; }
 button { width:100%; padding:14px; margin-top:20px; background:#7a1f5c; color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; }
 .med-card { background:white; border-radius:12px; padding:15px; margin-top:15px; border-left:5px solid #7a1f5c; }
 .med-card.warning { border-left-color:#d00000; background:#fff0f0; }
 .med-card.ordered { border-left-color:#2a9d8f; }
 .med-name { font-weight:700; font-size:18px; }
 .med-info { color:#555; margin:5px 0; }
 .actions { display:flex; gap:10px; margin-top:10px; }
 .actions button { margin:0; padding:8px; font-size:14px; flex:1; }
 .btn-taken { background:#2a9d8f; }
 .btn-ordered { background:#ffb703; color:#333; }
 .btn-delete { background:#d00000; }
 .warning-text { color:#d00000; font-weight:700; }
</style>
</head>
<body>
<div class="container">
 <h1>My Medtracker</h1>
 <label>medication Name:</label>
 <input id="name" placeholder="e.g Amoxicillin">
 <label>Total Pills in Bottle:</label>
 <input id="total" type="number" placeholder="e.g. 30">
 <label>Pills Taken Per Day:</label>
 <input id="perDay" type="number" placeholder="e.g. 2">
 <button onclick="addMed()">Add medication to List</button>
 <h2 style="margin-top:30px;">My Medication</h2>
 <div id="medList"></div>
 <h2 style="margin-top:30px;">Today's Schedule</h2>
 <div id="schedule"></div>
</div>
<script>
let meds = JSON.parse(localStorage.getItem('meds')||'[]');
function save(){ localStorage.setItem('meds', JSON.stringify(meds)); render(); }
function addMed(){
 const name = document.getElementById('name').value.trim();
 const total = parseInt(document.getElementById('total').value);
 const perDay = parseInt(document.getElementById('perDay').value);
 if(!name || !total || !perDay) return alert('Please fill all fields');
 meds.push({id:Date.now(), name, total, perDay, takenToday:0, ordered:false, lastTaken:null});
 document.getElementById('name').value=''; document.getElementById('total').value=''; document.getElementById('perDay').value='';
 save();
}
function markTaken(id){
 const m = meds.find(x=>x.id===id);
 if(m.total>0){ m.total--; m.takenToday++; m.lastTaken=new Date().toDateString(); save(); }
}
function toggleOrdered(id){
 const m = meds.find(x=>x.id===id); m.ordered=!m.ordered; save();
}
function delMed(id){ meds = meds.filter(x=>x.id!==id); save(); }
function render(){
 const list = document.getElementById('medList'); list.innerHTML='';
 const sched = document.getElementById('schedule'); sched.innerHTML='';
 const today = new Date().toDateString();
 meds.forEach(m=>{
   if(m.lastTaken!==today) m.takenToday=0;
   const daysLeft = Math.floor(m.total / m.perDay);
   const isLow = daysLeft < 7;
   const showWarning = isLow && !m.ordered;
   const card = document.createElement('div');
   card.className = 'med-card' + (showWarning ? ' warning' : '') + (m.ordered ? ' ordered' : '');
   card.innerHTML = `
     <div class="med-name">${m.name} - ${m.perDay} per day</div>
     <div class="med-info">${m.total} pills left</div>
     <div class="med-info ${showWarning?'warning-text':''}">
       ${showWarning ? '⚠️ ' : ''}Refill in ${daysLeft} days ${m.ordered ? '(Ordered)' : ''}
     </div>
     <div class="actions">
       <button class="btn-ordered" onclick="toggleOrdered(${m.id})">${m.ordered?'Ordered ✓':'Mark Ordered'}</button>
       <button class="btn-delete" onclick="delMed(${m.id})">Delete</button>
     </div>
   `;
   list.appendChild(card);
   if(m.takenToday < m.perDay){
     const s = document.createElement('div'); s.className='med-card';
     s.innerHTML = `<div>${m.name} - take ${m.perDay - m.takenToday} more today</div>
       <button class="btn-taken" onclick="markTaken(${m.id})" style="margin-top:10px">Mark Taken</button>`;
     sched.appendChild(s);
   }
 });
 if(meds.length===0){ list.innerHTML='<p style="color:#777">No medications yet</p>'; }
 if(sched.innerHTML===''){ sched.innerHTML='<p style="color:#777">All taken for today! ✓</p>'; }
}
render();
</script>
</body>
</html>
